<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MAGI :: TASK SYSTEM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #000000;
    --orange: #ff8800;
    --orange-bright: #ffaa33;
    --orange-dim: #aa5500;
    --green: #33ff33;
    --green-dim: #117711;
    --red: #ff3344;
    --cyan: #33ddff;
    --magenta: #ff44aa;
    --yellow: #ffdd33;
    --grey: #666666;
    --grey-dim: #333333;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: var(--bg);
    color: var(--orange);
    font-family: 'Share Tech Mono', 'VT323', monospace;
    height: 100%;
    overflow: hidden;
    font-size: 13px;
    line-height: 1.4;
    user-select: none;
    -webkit-font-smoothing: none;
  }

  body.scanlines::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0px,
      rgba(0,0,0,0) 2px,
      rgba(0,0,0,0.18) 3px,
      rgba(0,0,0,0.18) 3px
    );
    pointer-events: none;
    z-index: 9000;
    mix-blend-mode: multiply;
  }

  body.flicker::after {
    content: '';
    position: fixed; inset: 0;
    background: rgba(255,136,0,0.02);
    pointer-events: none;
    z-index: 9001;
    animation: flicker 0.15s infinite;
  }

  @keyframes flicker {
    0%, 100% { opacity: 0.7; }
    50% { opacity: 1; }
  }

  /* ============ AUTH SCREEN ============ */
  #auth-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5000;
  }

  .auth-box {
    border: 2px solid var(--orange);
    padding: 30px 40px;
    width: 420px;
    max-width: 90vw;
    position: relative;
  }

  .auth-box::before {
    content: 'AUTHENTICATION REQUIRED';
    position: absolute;
    top: -10px; left: 12px;
    background: var(--bg);
    padding: 0 8px;
    color: var(--orange);
    font-size: 11px;
    letter-spacing: 2px;
  }

  .auth-title {
    color: var(--orange-bright);
    font-size: 24px;
    text-align: center;
    margin-bottom: 8px;
    letter-spacing: 4px;
  }

  .auth-sub {
    color: var(--orange-dim);
    font-size: 10px;
    text-align: center;
    margin-bottom: 24px;
    letter-spacing: 2px;
  }

  .auth-box label {
    display: block;
    color: var(--orange-dim);
    font-size: 10px;
    letter-spacing: 2px;
    margin-bottom: 4px;
    margin-top: 12px;
  }

  .auth-box input {
    width: 100%;
    background: transparent;
    border: 1px solid var(--orange-dim);
    color: var(--orange);
    padding: 8px;
    font-family: inherit;
    font-size: 13px;
    outline: none;
  }

  .auth-box input:focus { border-color: var(--orange-bright); }

  .auth-buttons {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }

  .auth-buttons button {
    flex: 1;
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 10px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }

  .auth-buttons button:hover {
    background: var(--orange);
    color: var(--bg);
  }

  .auth-buttons button.secondary {
    border-color: var(--orange-dim);
    color: var(--orange-dim);
  }

  .auth-buttons button.secondary:hover {
    background: var(--orange-dim);
    color: var(--bg);
  }

  .auth-msg {
    margin-top: 12px;
    color: var(--red);
    font-size: 11px;
    min-height: 16px;
    text-align: center;
  }

  /* ============ BOOT SCREEN ============ */
  #boot-screen {
    position: fixed; inset: 0;
    background: var(--bg);
    color: var(--orange);
    z-index: 6000;
    padding: 40px;
    overflow: hidden;
    font-size: 14px;
  }

  #boot-screen .boot-title {
    color: var(--orange-bright);
    font-size: 32px;
    letter-spacing: 8px;
    text-align: center;
    margin-bottom: 30px;
  }

  #boot-log {
    max-height: 70vh;
    overflow: hidden;
  }

  .boot-line {
    margin-bottom: 4px;
    opacity: 0;
    animation: appear 0.05s forwards;
  }

  @keyframes appear { to { opacity: 1; } }

  /* ============ APP CHROME ============ */
  #app {
    display: none;
    height: 100vh;
    flex-direction: column;
    padding: 8px;
  }

  body.show-chrome #app .frame-corner,
  body.show-chrome #app .frame-label {
    display: block;
  }
  body:not(.show-chrome) #app .frame-corner,
  body:not(.show-chrome) #app .frame-label {
    display: none;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 8px;
    border: 1px solid var(--orange);
    margin-bottom: 8px;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .top-bar .left, .top-bar .right {
    display: flex;
    gap: 16px;
    align-items: center;
  }

  .system-id {
    color: var(--orange-bright);
    font-weight: bold;
    letter-spacing: 3px;
  }

  .clock {
    color: var(--green);
  }

  .top-btn {
    background: transparent;
    border: 1px solid var(--orange-dim);
    color: var(--orange);
    padding: 3px 10px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
  }

  .top-btn:hover {
    border-color: var(--orange-bright);
    color: var(--orange-bright);
  }

  /* ============ MARGIN HEX CODES ============ */
  body.show-hex .hex-margin {
    display: block;
  }
  .hex-margin {
    display: none;
    position: fixed;
    top: 0; bottom: 0;
    width: 24px;
    color: var(--green-dim);
    font-size: 10px;
    line-height: 1.3;
    overflow: hidden;
    pointer-events: none;
    z-index: 100;
    padding: 50px 2px;
    word-break: break-all;
  }
  .hex-left { left: 0; }
  .hex-right { right: 0; text-align: right; }

  body.show-hex #app {
    padding-left: 32px;
    padding-right: 32px;
  }

  /* ============ MAIN COLUMN GRID ============ */
  .lists-container {
    flex: 1;
    display: flex;
    gap: 2px;
    overflow-x: auto;
    overflow-y: hidden;
    padding: 4px 0;
    border: 1px solid var(--orange-dim);
    position: relative;
  }

  .list-column {
    flex: 1 1 0;
    min-width: 200px;
    max-width: 320px;
    border-right: 1px solid var(--grey-dim);
    padding: 8px 10px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .list-column:last-child { border-right: none; }

  .list-header {
    margin-bottom: 8px;
    border-bottom: 1px solid currentColor;
    padding-bottom: 6px;
  }

  .list-name {
    font-size: 18px;
    font-weight: bold;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    word-break: break-word;
    line-height: 1.1;
  }

  .list-name[contenteditable="true"] {
    outline: 1px dashed currentColor;
    padding: 2px;
  }

  .list-meta {
    font-size: 9px;
    color: var(--grey);
    letter-spacing: 2px;
    margin-top: 4px;
    display: flex;
    justify-content: space-between;
  }

  .list-actions {
    display: flex;
    gap: 4px;
    margin-top: 6px;
  }

  .mini-btn {
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    font-family: inherit;
    font-size: 9px;
    padding: 2px 6px;
    letter-spacing: 1px;
    cursor: pointer;
    opacity: 0.6;
  }

  .mini-btn:hover { opacity: 1; }

  /* ============ COLOR PICKER ============ */
  .color-picker-popup {
    position: fixed;
    background: var(--bg);
    border: 1px solid var(--orange);
    padding: 8px;
    display: grid;
    grid-template-columns: repeat(4, 22px);
    gap: 5px;
    z-index: 9999;
  }

  .color-swatch {
    width: 22px;
    height: 22px;
    cursor: pointer;
    border: 2px solid transparent;
    position: relative;
  }

  .color-swatch:hover { border-color: #ffffff88; }
  .color-swatch.active { border-color: #fff; }

  .color-swatch-label {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 8px;
    white-space: nowrap;
    color: var(--orange-dim);
    pointer-events: none;
    display: none;
  }
  .color-swatch:hover .color-swatch-label { display: block; }

  /* ============ TASK NOTES ============ */
  .task-notes {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px dashed currentColor;
    opacity: 0.9;
  }

  .task-notes-ta {
    width: 100%;
    background: rgba(0,0,0,0.4);
    border: 1px solid currentColor;
    color: currentColor;
    font-family: inherit;
    font-size: 10px;
    padding: 4px;
    resize: vertical;
    min-height: 48px;
    outline: none;
    letter-spacing: 0.5px;
    line-height: 1.4;
  }

  .task-notes-ta::placeholder { color: currentColor; opacity: 0.35; }

  .task-row.has-notes .task-text::after {
    content: ' ···';
    opacity: 0.4;
    font-size: 10px;
  }

  .task-list {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding-right: 4px;
  }

  .task-list::-webkit-scrollbar { width: 6px; }
  .task-list::-webkit-scrollbar-track { background: transparent; }
  .task-list::-webkit-scrollbar-thumb { background: var(--grey-dim); }

  .task-row {
    display: flex;
    align-items: flex-start;
    gap: 6px;
    padding: 3px 2px;
    font-size: 12px;
    cursor: pointer;
    border-left: 2px solid transparent;
    padding-left: 4px;
  }

  .task-row:hover { background: rgba(255,136,0,0.05); }

  .task-row.overdue {
    border-left-color: var(--red);
    background: rgba(255,51,68,0.08);
    color: var(--red);
    animation: pulse-red 1.5s infinite;
  }

  @keyframes pulse-red {
    0%, 100% { background: rgba(255,51,68,0.08); }
    50% { background: rgba(255,51,68,0.18); }
  }

  .task-row.urgent {
    border-left-color: var(--yellow);
    color: var(--yellow);
  }

  .task-row.completed {
    opacity: 0.35;
  }
  .task-row.completed .task-text {
    text-decoration: line-through;
    color: var(--grey);
  }

  .task-check {
    flex: 0 0 auto;
    width: 12px;
    height: 12px;
    border: 1px solid currentColor;
    margin-top: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    line-height: 1;
  }

  .task-check.done::after {
    content: '×';
    color: currentColor;
    font-weight: bold;
  }

  .task-main {
    flex: 1;
    min-width: 0;
  }

  .task-text {
    word-break: break-word;
    line-height: 1.3;
  }

  .task-meta {
    font-size: 9px;
    opacity: 0.7;
    margin-top: 2px;
    letter-spacing: 1px;
  }

  .task-del {
    flex: 0 0 auto;
    background: transparent;
    border: none;
    color: var(--grey);
    cursor: pointer;
    padding: 0 4px;
    font-family: inherit;
    font-size: 12px;
  }
  .task-del:hover { color: var(--red); }

  /* Add task form */
  .add-task {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--grey-dim);
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .add-task input, .add-task select {
    width: 100%;
    background: transparent;
    border: 1px solid var(--grey-dim);
    color: inherit;
    font-family: inherit;
    font-size: 11px;
    padding: 4px;
    outline: none;
  }

  .add-task input:focus, .add-task select:focus {
    border-color: currentColor;
  }

  .add-task button {
    background: transparent;
    border: 1px solid currentColor;
    color: inherit;
    font-family: inherit;
    font-size: 10px;
    padding: 4px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .add-task button:hover {
    background: currentColor;
  }
  .add-task button:hover {
    color: var(--bg);
  }

  /* Add list column at end */
  .add-list-column {
    flex: 0 0 auto;
    width: 60px;
    border-left: 1px dashed var(--grey-dim);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    color: var(--grey);
    font-size: 24px;
  }
  .add-list-column:hover { color: var(--orange); background: rgba(255,136,0,0.05); }

  /* ============ COMPLETED PANEL ============ */
  .completed-bar {
    margin-top: 8px;
    border: 1px solid var(--orange-dim);
    padding: 6px 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .completed-toggle {
    cursor: pointer;
    color: var(--orange);
  }

  #completed-panel {
    display: none;
    border: 1px solid var(--orange-dim);
    border-top: none;
    padding: 8px 12px;
    max-height: 200px;
    overflow-y: auto;
  }

  #completed-panel.open { display: block; }

  .completed-item {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    padding: 2px 0;
    color: var(--grey);
  }

  /* ============ SETTINGS MODAL ============ */
  #settings-modal {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 7000;
    align-items: center;
    justify-content: center;
  }
  #settings-modal.open { display: flex; }

  .settings-box {
    border: 2px solid var(--orange);
    background: var(--bg);
    padding: 24px 30px;
    width: 480px;
    max-width: 90vw;
    position: relative;
  }

  .settings-box::before {
    content: 'SYSTEM CONFIGURATION';
    position: absolute;
    top: -10px; left: 12px;
    background: var(--bg);
    padding: 0 8px;
    color: var(--orange);
    font-size: 11px;
    letter-spacing: 2px;
  }

  .settings-title {
    color: var(--orange-bright);
    font-size: 18px;
    letter-spacing: 4px;
    margin-bottom: 16px;
  }

  .setting-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid var(--grey-dim);
    font-size: 12px;
  }

  .setting-row:last-of-type { border-bottom: none; }

  .toggle {
    width: 50px;
    height: 22px;
    border: 1px solid var(--orange-dim);
    position: relative;
    cursor: pointer;
  }

  .toggle::after {
    content: '';
    position: absolute;
    top: 1px; left: 1px;
    width: 18px; height: 18px;
    background: var(--orange-dim);
    transition: all 0.15s;
  }

  .toggle.on {
    border-color: var(--orange);
  }
  .toggle.on::after {
    left: 29px;
    background: var(--orange);
  }

  .settings-close {
    margin-top: 16px;
    width: 100%;
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 8px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .settings-close:hover { background: var(--orange); color: var(--bg); }

  .danger-row {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--red);
  }

  .danger-row button {
    background: transparent;
    border: 1px solid var(--red);
    color: var(--red);
    padding: 6px 12px;
    font-family: inherit;
    font-size: 11px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .danger-row button:hover { background: var(--red); color: var(--bg); }

  /* Scrollbar global */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--grey-dim); }
  ::-webkit-scrollbar-thumb:hover { background: var(--orange-dim); }

  /* Empty state */
  .empty-list {
    color: var(--grey);
    font-size: 10px;
    padding: 8px 0;
    letter-spacing: 1px;
  }

  /* No lists state */
  .no-lists {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--grey);
    font-size: 14px;
    letter-spacing: 3px;
    flex-direction: column;
    gap: 16px;
  }
  .no-lists button {
    background: transparent;
    border: 1px solid var(--orange);
    color: var(--orange);
    padding: 10px 20px;
    font-family: inherit;
    font-size: 12px;
    letter-spacing: 2px;
    cursor: pointer;
  }
  .no-lists button:hover { background: var(--orange); color: var(--bg); }

  /* Loading */
  #loading {
    display: none;
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 8000;
    align-items: center;
    justify-content: center;
    color: var(--orange);
    font-size: 14px;
    letter-spacing: 4px;
  }
  #loading.show { display: flex; }

  @media (max-width: 700px) {
    .list-column { min-width: 160px; }
    body.show-hex #app { padding-left: 8px; padding-right: 8px; }
    body.show-hex .hex-margin { display: none; }
  }
</style>
</head>
<body class="scanlines flicker show-hex show-chrome">

<div class="hex-margin hex-left" id="hex-left"></div>
<div class="hex-margin hex-right" id="hex-right"></div>

<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-title">M.A.G.I.</div>
    <div class="auth-sub">TASK MANAGEMENT SUBSYSTEM v2.6.0</div>
    <label>OPERATOR ID (EMAIL)</label>
    <input type="email" id="auth-email" autocomplete="email" />
    <label>ACCESS CODE (PASSWORD)</label>
    <input type="password" id="auth-password" autocomplete="current-password" />
    <div class="auth-buttons">
      <button id="auth-login">SIGN IN</button>
      <button id="auth-signup" class="secondary">REGISTER</button>
    </div>
    <div class="auth-msg" id="auth-msg"></div>
  </div>
</div>

<!-- BOOT SCREEN -->
<div id="boot-screen" style="display:none;">
  <div class="boot-title">M.A.G.I.</div>
  <div id="boot-log"></div>
</div>

<!-- LOADING -->
<div id="loading">SYNCHRONIZING...</div>

<!-- MAIN APP -->
<div id="app">
  <div class="top-bar">
    <div class="left">
      <span class="system-id">MAGI-01</span>
      <span id="user-id" style="color:var(--orange-dim); font-size:10px;"></span>
    </div>
    <div class="right">
      <span class="clock" id="clock">--:--:--</span>
      <button class="top-btn" id="settings-btn">SETTINGS</button>
      <button class="top-btn" id="logout-btn">LOGOUT</button>
    </div>
  </div>

  <div class="lists-container" id="lists-container">
    <!-- Dynamic columns inserted here -->
  </div>

  <div class="completed-bar">
    <span style="color:var(--orange-dim);">RECENTLY COMPLETED</span>
    <span class="completed-toggle" id="completed-toggle">SHOW [+]</span>
  </div>
  <div id="completed-panel">
    <div id="completed-list"></div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div id="settings-modal">
  <div class="settings-box">
    <div class="settings-title">DISPLAY OPTIONS</div>
    <div class="setting-row"><span>BOOT SEQUENCE</span><div class="toggle" data-setting="boot"></div></div>
    <div class="setting-row"><span>CRT SCANLINES</span><div class="toggle" data-setting="scanlines"></div></div>
    <div class="setting-row"><span>SCREEN FLICKER</span><div class="toggle" data-setting="flicker"></div></div>
    <div class="setting-row"><span>HEX MARGIN CODES</span><div class="toggle" data-setting="hex"></div></div>
    <div class="setting-row"><span>FRAME CHROME</span><div class="toggle" data-setting="chrome"></div></div>
    <div class="danger-row">
      <button id="reset-btn">RESET LOCAL CACHE</button>
    </div>
    <button class="settings-close" id="settings-close">CLOSE</button>
  </div>
</div>

<script type="module" src="app.js"></script>
</body>
</html>
